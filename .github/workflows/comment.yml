name: Auto comment on new issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on new issue
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Привет! Спасибо за репорт. Пока разработчик изучает проблему, пожалуйста, проверьте базовые шаги:

            ### Базовая диагностика:
            1. **Антивирусы:** Убедитесь, что сторонние антивирусы не блокируют скачивание файлов `winws.exe` во временную папку.
            2. **DNS Фикс:** Зайдите в меню настроек (клавиша `S`) и включите **[3] Принудительный сброс DNS-кэша**. Часто это решает проблему с недоступностью сайтов после запуска туннеля.
            3. **Служба WARP:** Если скрипт пишет "Отсутствует ответ от службы маршрутизации WARP", попробуйте вручную открыть приложение Cloudflare WARP и убедиться, что оно не требует принятия новых лицензионных соглашений.
            4. **Смена пресета:** Если профиль `alt12` не работает у вашего провайдера, попробуйте другие доступные профили из списка.

            *Если после этих шагов проблема решилась, пожалуйста, закройте этот Issue.*
